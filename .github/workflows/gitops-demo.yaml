name: Github-Actions ArgoCD Kubernetes Project

on:
    push:
        branches:
          - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    gitops-demo:
        name: Build and Deploy using ArgoCD
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
            
            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build Docker Image
              run: docker build -t demo-app:local .

            - name: Create Kind Kubernetes Cluster
              uses: helm/kind-action@v1

            - name: Load Docker Image into Kind
              run: kind load docker-image demo-app:local --name chart-testing

            - name: Verify Kubernetes Cluster
              run: |
                kubectl cluster-info
                kubectl get nodes

            - name: Install ArgoCD
              run: |
                kubectl create namespace argocd
                kubectl apply -n argocd --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

            - name: Wait for ArgoCD Pods
              run: |
                kubectl wait --for=condition=available --timeout=300s deployment/argocd-server -n argocd
                kubectl wait --for=condition=available --timeout=300s deployment/argocd-repo-server -n argocd
                kubectl wait --for=condition=available --timeout=300s deployment/argocd-applicationset-controller -n argocd
            
            - name: Create ArgoCD Application
              run: kubectl apply -f argocd/application.yaml

            - name: Wait for Deployment to appear
              run: |
                for i in {1..60}; do
                  kubectl get deployment demo-app -n demo && break
                  echo "Waiting for deployment demo-app..."
                  sleep 5
                done

            - name: Wait for Application deployment
              run: kubectl wait --for=condition=available --timeout=300s deployment/demo-app -n demo

            - name: Show Kubernetes Resources
              run: |
                kubectl get all -n demo
                kubectl get applications -n argocd
                kubectl describe svc -n demo
                sleep 10

            - name: Wait for Service to appear
              run: |
                for i in {1..60}; do
                  kubectl get svc demo-app-service -n demo && exit 0
                  echo "Waiting for service demo-app-service..."
                  sleep 5
                done
                echo "Service was not created"
                exit 1

            - name: Test Application inside Cluster
              run: |
                kubectl run curl-test \
                  --image=curlimages/curl:8.8.0 \
                  --rm -i --restart=Never \
                  -n demo \
                  -- curl -s http://demo-app-service.demo.svc.cluster.local